name: test
on:
  workflow_dispatch:
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: test
    steps:
      - uses: actions/checkout@v6

      - name: Docker info
        run: |
          docker version
          docker compose version

      - name: Run tests
        run: bash run.sh

      - name: Logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --no-color sftp || true
